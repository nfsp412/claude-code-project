<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子流动可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        .controls button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            font-size: 14px;
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        移动鼠标产生涟漪 · 点击切换颜色模式
    </div>
    <div class="controls">
        <button onclick="toggleMode()">切换模式</button>
        <button onclick="resetParticles()">重置</button>
        <button onclick="toggleGlow()">开关光晕</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let hue = 0;
        let mouse = { x: null, y: null };
        let colorMode = 0;
        let glowEnabled = true;

        const modes = [
            'rainbow',
            'fire',
            'ocean',
            'forest'
        ];

        const colorPalettes = {
            rainbow: () => `hsl(${hue}, 100%, 50%)`,
            fire: () => `hsl(${Math.random() * 40 + 10}, 100%, ${Math.random() * 30 + 40}%)`,
            ocean: () => `hsl(${Math.random() * 60 + 180}, 80%, ${Math.random() * 30 + 40}%)`,
            forest: () => `hsl(${Math.random() * 80 + 100}, 70%, ${Math.random() * 30 + 30}%)`
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.hue = Math.random() * 360;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;

                // 鼠标交互
                if (mouse.x != null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        const angle = Math.atan2(dy, dx);
                        const force = (100 - dist) / 100;
                        this.speedX += Math.cos(angle) * force * 0.5;
                        this.speedY += Math.sin(angle) * force * 0.5;
                    }
                }

                // 边界检测
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }

            draw() {
                const color = colorPalettes[modes[colorMode]]();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);

                if (glowEnabled) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                }

                ctx.fillStyle = color;
                ctx.globalAlpha = this.life * 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function createParticlesAtMouse(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y));
            }
            if (particles.length > 300) {
                particles = particles.slice(particles.length - 300);
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    const dx = particles[a].x - particles[b].x;
                    const dy = particles[a].y - particles[b].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${1 - dist / 80})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            hue += 0.5;

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            connect();

            // 自动产生粒子
            if (Math.random() < 0.1) {
                particles.push(new Particle());
            }

            requestAnimationFrame(animate);
        }

        function toggleMode() {
            colorMode = (colorMode + 1) % modes.length;
            init();
        }

        function resetParticles() {
            init();
        }

        function toggleGlow() {
            glowEnabled = !glowEnabled;
        }

        // 事件监听
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            createParticlesAtMouse(e.x, e.y);
        });
        window.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                createParticlesAtMouse(e.x, e.y);
            }
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            createParticlesAtMouse(mouse.x, mouse.y);
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
